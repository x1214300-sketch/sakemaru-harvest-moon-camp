                                <ul className="space-y-4 text-slate-600">
                                    <li className="flex items-start gap-3"><Calendar className="w-5 h-5 text-slate-400 flex-shrink-0 mt-0.5"/><div><span className="font-bold text-slate-800 block">{t.seminar.time}</span>{t.seminar.timeVal}</div></li>
                                    <li className="flex items-start gap-3"><MapPin className="w-5 h-5 text-slate-400 flex-shrink-0 mt-0.5"/><div><span className="font-bold text-slate-800 block">{t.seminar.loc}</span>{t.seminar.locVal}</div></li>
                                    <li className="flex items-start gap-3"><div className="w-5 h-5 flex items-center justify-center text-slate-400 font-serif font-bold">$</div><div><span className="font-bold text-slate-800 block">{t.seminar.fee}</span>{t.seminar.feeVal}</div></li>
                                </ul>
                            </div>
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-stone-200"><h3 className="text-xl font-bold text-slate-900 mb-4">{t.seminar.highlightTitle}</h3><ul className="list-disc list-inside space-y-2 text-slate-600"><li>{t.seminar.h1}</li><li>{t.seminar.h2}</li><li>{t.seminar.h3}</li></ul></div>
                            <div className="rounded-xl overflow-hidden shadow-sm border border-stone-200 h-64"><iframe src="https://www.google.com/maps?q=台北市大安區瑞安街226號&output=embed" width="100%" height="100%" style={{border:0}} allowFullScreen="" loading="lazy"></iframe></div>
                        </div>

                        <div className="bg-white p-4 rounded-xl shadow-lg border-t-4 border-amber-600 sticky top-24">
                            <h2 className="text-2xl font-bold text-slate-900 mb-4 text-center">{t.seminar.formTitle}</h2>
                            <div className="w-full overflow-hidden rounded bg-gray-50 border border-gray-200 iframe-scroll-container" style={{ height: '866px' }}>
                                {/* Google Form Iframe Container */}
                                <iframe 
                                    src={GOOGLE_FORM_SEMINAR_URL}
                                    width="100%" 
                                    height="100%" 
                                    frameBorder="0" 
                                    marginHeight="0" 
                                    marginWidth="0"
                                    title="Google Form Registration"
                                >
                                    載入中...
                                </iframe>
                            </div>
                            <div className="text-center mt-4"><button type="button" onClick={onBack} className="text-sm text-slate-500 hover:text-slate-800 flex items-center justify-center gap-1 mx-auto"><Home className="w-4 h-4"/> {t.seminar.back}</button></div>
                        </div>
                    </div>
                </div>
            );
        };
        
        const PaymentPage = ({ onBack }) => {
             useEffect(() => { window.scrollTo(0, 0); }, []);
             return (
                <div className="min-h-screen bg-stone-50 pt-24 pb-24 px-4 iframe-scroll-container">
                    <div className="max-w-3xl mx-auto">
                        <div className="bg-white rounded-xl shadow-lg overflow-hidden">
                             <div className="bg-slate-900 text-white p-6 flex justify-between items-center">
                                <h2 className="text-xl font-bold">Payment / 匯款資訊填寫</h2>
                                <button onClick={onBack}><XIcon className="w-6 h-6 text-white/80 hover:text-white" /></button>
                             </div>
                             <div className="w-full bg-white iframe-scroll-container" style={{ height: '1828px' }}>
                                <iframe src={GOOGLE_FORM_PAYMENT_URL} width="100%" height="100%" frameBorder="0" marginHeight="0" marginWidth="0">Loading...</iframe>
                             </div>
                        </div>
                    </div>
                </div>
             );
        };

        const MainPage = ({ onLineClick, onViewChange, t, lang, onOpenPayment }) => {
            return (
                <div className="animate-fade-in">
                    <Hero onViewChange={onViewChange} t={t} lang={lang} />
                    <Highlights t={t} />
                    <Breweries t={t} />
                    <Testimonials t={t} />
                    <Itinerary t={t} lang={lang} />
                    <InfoSection t={t} />
                    <FAQ t={t} />
                    <Pricing onLineClick={onLineClick} onViewChange={onViewChange} t={t} lang={lang} onOpenPayment={onOpenPayment} />
                </div>
            );
        };

        const App = () => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isPaymentModalOpen, setIsPaymentModalOpen] = useState(false);
            const [currentView, setCurrentView] = useState('main');
            const [lang, setLang] = useState('zh-TW');
            const t = translations[lang];

            const handleCreditCardClick = () => {
                setIsPaymentModalOpen(false);
                const socialSection = document.getElementById('social-contact');
                if (socialSection) socialSection.scrollIntoView({ behavior: 'smooth' });
            };

            const handleTransferClick = () => {
                setIsPaymentModalOpen(false);
                setCurrentView('payment');
            };

            return (
                <div className={`antialiased selection:bg-amber-200 selection:text-amber-900 ${lang === 'en' ? 'en-font' : ''}`}>
                    <Header onViewChange={setCurrentView} currentView={currentView} lang={lang} setLang={setLang} t={t} />
                    {currentView === 'main' && <MainPage onLineClick={() => setIsModalOpen(true)} onViewChange={setCurrentView} t={t} lang={lang} onOpenPayment={() => setIsPaymentModalOpen(true)} />}
                    {currentView === 'seminar' && <SeminarPage onBack={() => setCurrentView('main')} t={t} />}
                    {currentView === 'payment' && <PaymentPage onBack={() => setCurrentView('main')} />}
                    
                    <Footer t={t} />
                    <AlcoholWarning />

                    {/* LINE QR Code Modal */}
                    <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)}>
                        <div className="text-center"><h3 className="text-xl font-bold text-slate-900 mb-4">加入 LINE 官方帳號</h3><p className="text-sm text-slate-600 mb-4">請掃描下方 QR Code 或點擊按鈕加入好友洽詢席次。</p><div className="bg-white p-2 border border-gray-200 rounded-lg inline-block mb-4"><img src="https://i.postimg.cc/m23nFYZ9/jie-tu-2025-11-12-shang-wu11-08-17.png" alt="LINE QR Code" className="w-48 h-48 object-contain" /></div><a href="https://lin.ee/yNtFdhG" target="_blank" rel="noopener noreferrer" className="block w-full py-3 bg-[#06C755] hover:bg-[#05b54d] text-white rounded font-bold transition-colors">一鍵加入 LINE 好友</a></div>
                    </Modal>

                    {/* Payment Method Modal */}
                    <Modal isOpen={isPaymentModalOpen} onClose={() => setIsPaymentModalOpen(false)}>
                         <div className="text-center p-2">
                            <h3 className="text-2xl font-bold text-slate-900 mb-6">{t.pricing.modalTitle}</h3>
                            <div className="space-y-4">
                                <button onClick={handleCreditCardClick} className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold text-lg transition-all flex items-center justify-center gap-3 shadow-md">
                                    <CreditCard className="w-6 h-6" /> {t.pricing.credit}
                                </button>
                                <p className="text-red-500 text-sm font-bold mt-1">{t.pricing.creditNote}</p>
                                
                                <div className="relative flex py-2 items-center"><div className="flex-grow border-t border-gray-300"></div><span className="flex-shrink-0 mx-4 text-gray-400 text-sm">OR</span><div className="flex-grow border-t border-gray-300"></div></div>

                                <button onClick={handleTransferClick} className="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-bold text-lg transition-all flex items-center justify-center gap-3 shadow-md">
                                    <Banknote className="w-6 h-6" /> {t.pricing.transfer}
                                </button>
                            </div>
                        </div>
                    </Modal>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
